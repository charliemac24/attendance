services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: attendance
      MYSQL_USER: attendance
      MYSQL_PASSWORD: attendance
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3317:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    develop:
      watch:
        - path: .
          action: rebuild
          ignore:
            - node_modules/**
            - dist/**
            - release/**
            - uploads/**
            - docker-compose.yml
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://attendance:attendance@db:3306/attendance
      SESSION_SECRET: replace-with-a-long-random-secret
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5100:5000"
    volumes:
      - ./uploads:/app/uploads

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8082:80"

volumes:
  mysql_data:
